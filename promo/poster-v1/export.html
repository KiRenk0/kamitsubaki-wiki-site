    <style>
      :root {
        color-scheme: light;
        --ink: #123b37;
        --aqua: #5ebeb1;
        --aqua-deep: #27665e;
        --sun: #f0d72d;
        --paper: #f7faf2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        color: var(--ink);
        background: #dfeae1;
        font-family: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button {
        font: inherit;
      }

      .studio {
        width: min(1500px, calc(100% - 40px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .toolbar {
        position: sticky;
        top: 16px;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 22px;
        margin-bottom: 24px;
        padding: 16px 18px;
        color: #ecf8f3;
        background: rgba(18, 59, 55, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 18px 50px rgba(18, 59, 55, 0.18);
        backdrop-filter: blur(18px);
      }

      .toolbar__title {
        margin: 0;
        font-size: 13px;
        font-weight: 760;
        letter-spacing: 0.08em;
      }

      .toolbar__title span {
        display: block;
        margin-top: 3px;
        color: rgba(236, 248, 243, 0.58);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.06em;
      }

      .toolbar__actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 9px;
      }

      .action {
        min-height: 40px;
        padding: 0 15px;
        color: #eff9f5;
        background: transparent;
        border: 1px solid rgba(239, 249, 245, 0.28);
        border-radius: 0;
        cursor: pointer;
        font-size: 11px;
        font-weight: 760;
        letter-spacing: 0.05em;
        transition: transform 150ms ease, color 150ms ease, background 150ms ease;
      }

      .action:hover,
      .action:focus-visible {
        color: var(--ink);
        background: #ffffff;
        outline: none;
        transform: translateY(-1px);
      }

      .action--primary {
        color: var(--ink);
        background: var(--sun);
        border-color: var(--sun);
      }

      .preview-grid {
        display: grid;
        gap: 30px;
      }

      .preview {
        margin: 0;
      }

      .preview__meta {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin: 0 0 10px;
        color: #315e58;
        font-size: 11px;
        font-weight: 760;
        letter-spacing: 0.07em;
      }

      .preview__meta span {
        color: rgba(49, 94, 88, 0.58);
        font-weight: 560;
      }

      .artboard {
        display: block;
        width: 100%;
        height: auto;
        background: #cfdfd9;
        box-shadow: 0 28px 75px rgba(18, 59, 55, 0.2);
      }

      .status {
        min-height: 20px;
        margin: 15px 2px 0;
        color: #47706b;
        font-size: 11px;
        letter-spacing: 0.04em;
      }

      @media (max-width: 820px) {
        .studio {
          width: min(100% - 20px, 1500px);
          padding-top: 10px;
        }

        .toolbar {
          position: static;
          align-items: flex-start;
          flex-direction: column;
        }

        .toolbar__actions {
          width: 100%;
          justify-content: stretch;
        }

        .action {
          flex: 1 1 150px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
        }
      }
    </style>

      <p class="status" id="status" aria-live="polite">选择上方按钮即可导出高清 PNG。</p>
    </main>

    <script>
      const exportSpecs = {
        'poster-4x3': { width: 2400, height: 1800, filename: 'kamitsubaki-wiki-poster-4x3.png', background: './assets/kamitsubaki-promo-background.jpg' },
        'poster-3x4': { width: 1800, height: 2400, filename: 'kamitsubaki-wiki-poster-3x4.png', background: './assets/kamitsubaki-promo-background.jpg' },
        'poster-16x9': { width: 2560, height: 1440, filename: 'kamitsubaki-wiki-poster-16x9.png', background: './assets/kamitsubaki-promo-background-16x9.jpg' },
      };
      const status = document.querySelector('#status');

      function toDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      async function getEmbeddedBackground(url) {
        getEmbeddedBackground.cache ||= new Map();
        if (!getEmbeddedBackground.cache.has(url)) {
          getEmbeddedBackground.cache.set(url, fetch(url)
            .then((response) => {
              if (!response.ok) throw new Error('背景图片加载失败');
              return response.blob();
            })
            .then(toDataUrl));
        }
        return getEmbeddedBackground.cache.get(url);
      }

      async function exportPoster(id, options = {}) {
        const source = document.getElementById(id);
        const spec = exportSpecs[id];
        const clone = source.cloneNode(true);
        const embeddedBackground = await getEmbeddedBackground(spec.background);
        clone.setAttribute('width', String(spec.width));
        clone.setAttribute('height', String(spec.height));
        clone.querySelector('[data-background]').setAttribute('href', embeddedBackground);

        const serialized = new XMLSerializer().serializeToString(clone);
        const svgBlob = new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' });
        const svgUrl = URL.createObjectURL(svgBlob);

        try {
          const image = await new Promise((resolve, reject) => {
            const raster = new Image();
            raster.onload = () => resolve(raster);
            raster.onerror = () => reject(new Error('海报渲染失败'));
            raster.src = svgUrl;
          });
          const canvas = document.createElement('canvas');
          canvas.width = spec.width;
          canvas.height = spec.height;
          const context = canvas.getContext('2d');
          context.drawImage(image, 0, 0, spec.width, spec.height);
          const pngBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png', 1));
          const pngUrl = URL.createObjectURL(pngBlob);
          const link = document.createElement('a');
          link.href = pngUrl;
          link.download = spec.filename;
          document.body.append(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(pngUrl), 1500);
          if (!options.silent) status.textContent = `已导出 ${spec.filename}`;
        } finally {
          URL.revokeObjectURL(svgUrl);
        }
      }

      document.querySelectorAll('[data-export]').forEach((button) => {
        button.addEventListener('click', async () => {
          button.disabled = true;
          status.textContent = '正在生成高清 PNG…';
          try {
            await exportPoster(button.dataset.export);
          } catch (error) {
            status.textContent = error.message || '导出失败，请刷新后重试。';
          } finally {
            button.disabled = false;
          }
        });
      });

      document.querySelector('#export-all').addEventListener('click', async (event) => {
        const button = event.currentTarget;
        button.disabled = true;
        status.textContent = '正在生成三个高清版本…';
        try {
          await exportPoster('poster-4x3', { silent: true });
          await new Promise((resolve) => setTimeout(resolve, 350));
          await exportPoster('poster-3x4', { silent: true });
          await new Promise((resolve) => setTimeout(resolve, 350));
          await exportPoster('poster-16x9', { silent: true });
          status.textContent = '4:3、3:4 与 16:9 三个版本已导出。';
        } catch (error) {
          status.textContent = error.message || '导出失败，请刷新后重试。';
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
